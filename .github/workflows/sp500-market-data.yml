name: S&P 500 Market Data

on:
  schedule:
    # 미국 장 마감 후 (UTC 22:00 = KST 07:00)
    - cron: '0 22 * * 1-5'
    # 미국 장중 업데이트 (UTC 16:00 = EST 11:00)
    - cron: '0 16 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch S&P 500 market data
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          python scripts/fetch_sp500_market_data.py
          echo "=== data/sp500/ 폴더 확인 ==="
          ls -la data/sp500/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sp500/
          git diff --staged --quiet || git commit -m "📊 S&P 500 market data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
